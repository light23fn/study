<html>
<head>
<meta charset="UTF-8">

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.box {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding:30px;
  border-radius:15px;
  width:320px;
  color:white;
}

input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#667eea;
  color:white;
  cursor:pointer;
  margin-top:10px;
  transition:0.3s;
}

button:hover {
  background:#5a67d8;
}

button:disabled {
  background:#999;
}

/* 🔥 NOTIFICAÇÕES */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 15px 20px;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.4s;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.success { background: #2ecc71; }
.error { background: #e74c3c; }
</style>

<script>
function showToast(msg, type){
 let t = document.createElement("div");
 t.className = "toast " + type;
 t.innerText = msg;

 document.body.appendChild(t);

 setTimeout(()=> t.classList.add("show"),100);

 setTimeout(()=>{
   t.classList.remove("show");
   setTimeout(()=> t.remove(),300);
 },3000);
}

async function login(){
 let username = document.getElementById("u").value.trim();
 let password = document.getElementById("p").value.trim();
 let btn = document.getElementById("loginBtn");

 if(!username || !password){
   showToast("Preenche tudo!", "error");
   return;
 }

 btn.disabled = true;
 btn.innerText = "A entrar...";

 try {
   let res = await fetch('/login',{
     method:'POST',
     headers:{'Content-Type':'application/json'},
     body:JSON.stringify({username,password})
   });

   let data = await res.json();

   if(data.status){
     showToast("Login com sucesso!", "success");
     setTimeout(()=> window.location="dash.html", 1000);
   } else {
     showToast(data.error || "Erro login", "error");
   }

 } catch(e){
   showToast("Servidor offline!", "error");
 }

 btn.disabled = false;
 btn.innerText = "Entrar";
}

async function register(){
 let username = document.getElementById("u").value.trim();
 let password = document.getElementById("p").value.trim();

 if(!username || !password){
   showToast("Preenche tudo!", "error");
   return;
 }

 try {
   let res = await fetch('/register',{
     method:'POST',
     headers:{'Content-Type':'application/json'},
     body:JSON.stringify({username,password})
   });

   let data = await res.json();

   if(data.status){
     showToast("Conta criada!", "success");
   } else {
     showToast(data.error || "Erro registo", "error");
   }

 } catch(e){
   showToast("Servidor offline!", "error");
 }
}
</script>
</head>

<body>

<div class="box">
<h2>🔐 Login</h2>

<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">Entrar</button>
<button onclick="register()">Registar</button>
</div>

</body>
</html>
