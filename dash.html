<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Plataforma de Estudo</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  margin: 0;
}

header {
  background: rgba(0,0,0,0.2);
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 22px;
}

nav {
  background: rgba(0,0,0,0.3);
  padding: 10px;
  text-align: center;
}

nav a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
  font-weight: bold;
}

/* 🔥 MESMO CARD DO ADD */
.container {
  max-width: 600px;
  margin: 40px auto;
  padding: 30px;

  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(15px);

  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.2);

  box-shadow: 
    0 8px 32px rgba(0,0,0,0.2),
    inset 0 0 10px rgba(255,255,255,0.1);

  text-align: center;
}

h2 {
  color: white;
  margin-top: 0;
}

p {
  color: rgba(255,255,255,0.9);
  line-height: 1.6;
}

/* botões estilo add */
.btn {
  display: block;
  width: 100%;
  margin-top: 15px;
  padding: 14px;
  border-radius: 10px;
  background: #667eea;
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  background: #5a67d8;
}

/* 📱 SÓ MOBILE */
@media (max-width: 600px) {

  body {
    padding: 10px;
  }

  header {
    font-size: 18px;
    padding: 15px;
  }

  nav a {
    display: inline-block;
    margin: 5px;
    font-size: 14px;
  }

  .container {
    margin: 20px auto;
    padding: 20px;
    width: 100%;
    max-width: 100%;
  }

  h2 {
    font-size: 20px;
  }

  p {
    font-size: 14px;
  }

  .btn {
    font-size: 16px;
  }

}
</style>
</head>

<body>

<header>📚 Plataforma de Estudo</header>

<nav>
<a href="index.html">Início</a>
<a href="resumos.html">Resumos</a>
<a href="add.html">Adicionar</a>
</nav>

<div class="container">
  
  <h2>Bem-vindo 👋</h2>
  <p>
    Explora resumos, estuda conteúdos e adiciona novos conhecimentos à tua base de dados.
  </p>

  <a href="resumos.html" class="btn">📖 Ver Resumos</a>
  <a href="add.html" class="btn">➕ Adicionar Resumo</a>

</div>

</body>
</html>
